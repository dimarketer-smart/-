<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;display:flex;justify-content:center;padding:10px;font-family:Arial,sans-serif}
#g{width:380px}
#hdr{background:#111;border-radius:12px 12px 0 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
#hdr h1{color:#fff;font-size:12px;font-weight:500;letter-spacing:1px}
.hs .v{color:#fff;font-size:20px;font-weight:500;display:block;text-align:center}
.hs .l{color:#666;font-size:10px;display:block;text-align:center}
#pb{background:#222;height:4px}
#pf{background:#fff;height:4px;width:0%;transition:width 0.3s}
#lb{background:#1a1a1a;padding:5px 16px;display:flex;align-items:center;justify-content:space-between}
#li{color:#888;font-size:11px}
#lp{color:#fff;font-size:11px;font-weight:500}
#bw{background:#1a1a1a;padding:8px;position:relative}
#bd{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.c{height:40px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1)}
.c.sel{background:rgba(255,255,255,0.22);outline:2px solid #fff}
.c.hi{outline:2px solid rgba(255,255,255,0.55)}
.c.fade{opacity:0.1}
#ftr{background:#111;border-radius:0 0 12px 12px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#msg{color:#888;font-size:11px;flex:1}
#hbtn{background:transparent;border:0.5px solid #444;color:#888;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer}
#ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.93);border-radius:6px;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:9;padding:20px;text-align:center}
#ov.on{display:flex}
#oi{font-size:44px;line-height:1}
#ot{color:#fff;font-size:18px;font-weight:500}
#osb{color:#888;font-size:12px;line-height:1.6}
#opts{color:#fff;font-size:13px;background:rgba(255,255,255,0.08);padding:6px 16px;border-radius:6px;border:0.5px solid #333}
#nb{background:#fff;color:#000;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;margin-top:2px}
#rb{background:transparent;color:#555;border:0.5px solid #333;padding:7px 18px;border-radius:8px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div id="g">
  <div id="hdr">
    <div class="hs"><span class="v" id="sv">0</span><span class="l">очки</span></div>
    <h1>ЗАВАРИВАЕМ В ЧК</h1>
    <div class="hs"><span class="v" id="mv">25</span><span class="l">ходов</span></div>
  </div>
  <div id="pb"><div id="pf"></div></div>
  <div id="lb"><span id="li">Раунд 1 из 10</span><span id="lp">+100 ₸ на бонус</span></div>
  <div id="bw">
    <div id="bd"></div>
    <div id="ov">
      <div id="oi">🏆</div>
      <div id="ot">Раунд пройден!</div>
      <div id="osb">Отличная работа!</div>
      <div id="opts"></div>
      <button id="nb">Следующий раунд</button>
      <button id="rb">Начать заново</button>
    </div>
  </div>
  <div id="ftr">
    <div id="msg">Собирай цепочки из 3+</div>
    <button id="hbtn">Подсказка</button>
  </div>
</div>
<script>
// DIFFICULTY SYSTEM:
// easy (1-5):   много ходов, маленькая цель, 4 типа тайлов
// hard (6-8):   меньше ходов, цель выше, 5 типов тайлов
// vhard (9-10): мало ходов, цель большая, 6 типов тайлов, бонусные тайлы мешают

var TSETS = [
  ['☕','🫘','🥐','🍵'],           // easy: 4 типа — легко совпадать
  ['☕','🫘','🥐','🍵','🧁'],       // hard: 5 типов
  ['☕','🫘','🥐','🍵','🧁','🍫']   // vhard: 6 типов — труднее совпасть
];
var NM=['кофе','зёрна','круассан','чай','кекс','шоколад'];

//                goal  moves  tiles  prize                    icon  desc
var LV=[
  {goal:250, moves:25, ti:0, prize:'+100 ₸ на бонус',    icon:'💰', desc:'100 тенге на бонусный счёт!'},
  {goal:300, moves:24, ti:0, prize:'+200 ₸ на бонус',    icon:'💰', desc:'200 тенге на бонусный счёт!'},
  {goal:350, moves:23, ti:0, prize:'+300 ₸ на бонус',    icon:'💰', desc:'300 тенге на бонусный счёт!'},
  {goal:400, moves:22, ti:0, prize:'+400 ₸ на бонус',    icon:'💰', desc:'400 тенге на бонусный счёт!'},
  {goal:450, moves:21, ti:0, prize:'+500 ₸ на бонус',    icon:'💰', desc:'500 тенге на бонусный счёт!'},
  {goal:900, moves:16, ti:1, prize:'Орешек со сгущёнкой', icon:'🥜', desc:'Орешек со сгущёнкой — твой!'},
  {goal:1100,moves:14, ti:1, prize:'Печенька',            icon:'🍪', desc:'Печенька уже ждёт тебя!'},
  {goal:1350,moves:12, ti:1, prize:'Фильтр кофе',         icon:'☕', desc:'Фильтр кофе от бариста!'},
  {goal:2000,moves:10, ti:2, prize:'Мерч ЧК',             icon:'👕', desc:'Крутой мерч от ЧК!'},
  {goal:2800,moves:9,  ti:2, prize:'Завтрак на выбор',    icon:'🍳', desc:'Завтрак на выбор — заслужил!'}
];

var R=7,C=8;
var board=[],score=0,moves=0,sel=null,busy=false,lvl=0;
var curTiles=[];

function randTile(r,c){
  var n=curTiles.length,t,tries=0;
  do{
    t=Math.floor(Math.random()*n);
    tries++;
    if(tries>50)break;
  }while(
    (c>=2&&board[r][c-1]===t&&board[r][c-2]===t)||
    (r>=2&&board[r-1]&&board[r-1][c]===t&&board[r-2]&&board[r-2][c]===t)
  );
  return t;
}

function initBoard(){
  board=[];
  for(var r=0;r<R;r++){
    board[r]=[];
    for(var c=0;c<C;c++)board[r][c]=randTile(r,c);
  }
}

function startLevel(l){
  lvl=l;score=0;sel=null;busy=false;
  moves=LV[l].moves;
  curTiles=TSETS[LV[l].ti];
  document.getElementById('ov').classList.remove('on');
  document.getElementById('li').textContent='Раунд '+(l+1)+' из 10';
  document.getElementById('lp').textContent=LV[l].prize;
  document.getElementById('pf').style.width='0%';
  initBoard();
  render();
  setMsg('Цель: '+LV[l].goal+' очков');
}

function render(){
  var bd=document.getElementById('bd');
  bd.innerHTML='';
  for(var r=0;r<R;r++){
    for(var c=0;c<C;c++){
      var d=document.createElement('div');
      d.className='c';
      d.textContent=board[r][c]>=0?curTiles[board[r][c]]:'';
      if(sel&&sel[0]===r&&sel[1]===c)d.classList.add('sel');
      d.addEventListener('click',(function(rr,cc){return function(){tap(rr,cc);};})(r,c));
      bd.appendChild(d);
    }
  }
  document.getElementById('sv').textContent=score;
  document.getElementById('mv').textContent=moves;
  document.getElementById('pf').style.width=Math.min(100,Math.round(score/LV[lvl].goal*100))+'%';
}

function tap(r,c){
  if(busy)return;
  clearHi();
  if(!sel){sel=[r,c];render();setMsg(NM[board[r][c]]+' выбран');return;}
  var sr=sel[0],sc=sel[1];
  if(sr===r&&sc===c){sel=null;render();return;}
  if(Math.abs(sr-r)+Math.abs(sc-c)!==1){sel=[r,c];render();return;}
  sel=null;
  doSwap(sr,sc,r,c);
}

function swapT(r1,c1,r2,c2){var t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t;}

function doSwap(r1,c1,r2,c2){
  busy=true;
  swapT(r1,c1,r2,c2);
  var m=findM();
  if(!m.length){swapT(r1,c1,r2,c2);busy=false;render();setMsg('Нет совпадений — пробуй ещё!');return;}
  moves--;
  processM(m);
}

function findM(){
  var f={},r,c,l,i;
  for(r=0;r<R;r++){
    for(c=0;c<C-2;c++){
      if(board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]){
        l=3;while(c+l<C&&board[r][c+l]===board[r][c])l++;
        for(i=0;i<l;i++)f[r*C+(c+i)]=1;
        c+=l-1;
      }
    }
  }
  for(c=0;c<C;c++){
    for(r=0;r<R-2;r++){
      if(board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]){
        l=3;while(r+l<R&&board[r+l][c]===board[r][c])l++;
        for(i=0;i<l;i++)f[(r+i)*C+c]=1;
        r+=l-1;
      }
    }
  }
  return Object.keys(f).map(function(k){var n=parseInt(k);return{r:Math.floor(n/C),c:n%C};});
}

function processM(m){
  var pts=m.length*10+(m.length>3?(m.length-3)*20:0);
  score+=pts;
  render();
  setMsg(NM[board[m[0].r][m[0].c]]+' x'+m.length+' +'+pts+' очков!');
  var bd=document.getElementById('bd');
  m.forEach(function(p){var el=bd.children[p.r*C+p.c];if(el)el.classList.add('fade');});
  setTimeout(function(){
    m.forEach(function(p){board[p.r][p.c]=-1;});
    gravity();
    var nm=findM();
    if(nm.length){setTimeout(function(){processM(nm);},280);}
    else{busy=false;render();checkEnd();}
  },300);
}

function gravity(){
  var c,r,e;
  for(c=0;c<C;c++){
    e=R-1;
    for(r=R-1;r>=0;r--){
      if(board[r][c]!==-1){board[e][c]=board[r][c];if(e!==r)board[r][c]=-1;e--;}
    }
    for(r=e;r>=0;r--)board[r][c]=Math.floor(Math.random()*curTiles.length);
  }
}

function checkEnd(){
  var L=LV[lvl],ov=document.getElementById('ov');
  if(score>=L.goal){
    document.getElementById('oi').textContent=L.icon;
    document.getElementById('ot').textContent='Раунд '+(lvl+1)+' пройден!';
    document.getElementById('osb').textContent=L.desc;
    document.getElementById('opts').textContent='Набрано '+score+' очков';
    var nb=document.getElementById('nb');
    if(lvl>=9){nb.textContent='Играть снова!';nb.onclick=function(){startLevel(0);};}
    else{nb.textContent='Следующий раунд →';nb.onclick=function(){startLevel(lvl+1);};}
    ov.classList.add('on');
  }else if(moves<=0){
    document.getElementById('oi').textContent='😔';
    document.getElementById('ot').textContent='Ходы закончились';
    document.getElementById('osb').textContent='Не хватило '+(L.goal-score)+' очков до приза';
    document.getElementById('opts').textContent=score+' из '+L.goal;
    document.getElementById('nb').textContent='Попробовать снова';
    document.getElementById('nb').onclick=function(){startLevel(lvl);};
    ov.classList.add('on');
  }
}

function clearHi(){document.querySelectorAll('.hi').forEach(function(el){el.classList.remove('hi');});}

function showHint(){
  clearHi();
  var h=findHint();
  if(!h){setMsg('Нет ходов — перемешиваем!');initBoard();render();return;}
  var bd=document.getElementById('bd');
  var a=bd.children[h[0]*C+h[1]],b=bd.children[h[2]*C+h[3]];
  if(a)a.classList.add('hi');
  if(b)b.classList.add('hi');
  setMsg('Вот возможный ход!');
  setTimeout(clearHi,2000);
}

function findHint(){
  var dirs=[[0,1],[1,0]],r,c,d,nr,nc,m;
  for(r=0;r<R;r++){
    for(c=0;c<C;c++){
      for(d=0;d<2;d++){
        nr=r+dirs[d][0];nc=c+dirs[d][1];
        if(nr>=R||nc>=C)continue;
        swapT(r,c,nr,nc);m=findM();swapT(r,c,nr,nc);
        if(m.length)return[r,c,nr,nc];
      }
    }
  }
  return null;
}

function setMsg(t){document.getElementById('msg').textContent=t;}

document.getElementById('rb').addEventListener('click',function(){startLevel(0);});
document.getElementById('hbtn').addEventListener('click',showHint);

startLevel(0);
</script>
</body>
</html>
